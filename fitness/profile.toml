target_muscles = ["광배근", "대원근", "후면삼각근", "승모근"]
description = "V-taper 체형을 위해 등 너비와 두께를 균형있게 발달"

[weaknesses]
last_updated = "2026-04-22"
areas = ["옆구리(외/내복사근)", "내측광근(VMO)", "좌측 전반", "근지구력/체력"]
notes = """
- 옆구리(복근 코어) 부족 — 사이드 플랭크 + 밴드, 케이블 우드찹 등으로 보강 (04-16)
- 우측 슬개골 외측으로 과한 움직임 (무릎 펼 때 덜그럭) → 내측광근(VMO) 운동 비중 ↑ (04-21)
- 좌측이 우측보다 약함 → 비대칭 운동 시 좌측부터 시작하고, 우측은 좌측 볼륨에 맞춤 (04-21)
- 근지구력/체력 부족이 지속 관찰됨 → 러닝 등 유산소 추가 필요 (04-22)
"""

